<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="description" content="Mind Notes - Unlock your mind, one note at a time. Organize thoughts, ideas, tasks, and memories with AI-powered categorization." />
		<meta name="keywords" content="notes, mind notes, ai notes, organization, productivity, thoughts, ideas" />
		<meta name="author" content="Mind Notes" />
		
		<!-- Security headers -->
		<meta http-equiv="X-Content-Type-Options" content="nosniff" />
		<meta http-equiv="X-Frame-Options" content="DENY" />
		<meta http-equiv="X-XSS-Protection" content="1; mode=block" />
		<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
		
		<!-- Favicon and app icons -->
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		
		<!-- Theme and color scheme -->
		<meta name="theme-color" content="#667eea" />
		<meta name="color-scheme" content="dark light" />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Mind Notes - Unlock your mind, one note at a time" />
		<meta property="og:description" content="Organize thoughts, ideas, tasks, and memories with AI-powered categorization." />
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta property="og:site_name" content="Mind Notes" />
		
		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:title" content="Mind Notes - Unlock your mind, one note at a time" />
		<meta property="twitter:description" content="Organize thoughts, ideas, tasks, and memories with AI-powered categorization." />
		<meta property="twitter:image" content="%sveltekit.assets%/twitter-image.png" />
		
		<!-- Preload important fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
		
		<!-- Preload critical resources -->
		<link rel="modulepreload" href="/src/app.js" />
		
		<title>Mind Notes - Unlock your mind, one note at a time</title>
		
		%sveltekit.head%
		
		<style>
			/* Critical CSS to prevent FOUC */
			body {
				margin: 0;
				padding: 0;
				font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				line-height: 1.6;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				text-rendering: optimizeLegibility;
			}
			
			/* Loading screen */
			.loading-screen {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #16213e 100%);
				display: flex;
				align-items: center;
				justify-content: center;
				z-index: 9999;
				transition: opacity 0.3s ease;
			}
			
			.loading-content {
				text-align: center;
				color: #e2e8f0;
			}
			
			.loading-logo {
				width: 48px;
				height: 48px;
				margin: 0 auto 1rem;
				animation: pulse 2s ease-in-out infinite;
			}
			
			.loading-text {
				font-size: 1.25rem;
				font-weight: 600;
				margin-bottom: 0.5rem;
				background: linear-gradient(135deg, #667eea, #764ba2);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
			}
			
			.loading-subtitle {
				font-size: 0.875rem;
				opacity: 0.8;
			}
			
			@keyframes pulse {
				0%, 100% { opacity: 1; transform: scale(1); }
				50% { opacity: 0.7; transform: scale(0.95); }
			}
			
			/* Hide loading screen when app is ready */
			.app-ready .loading-screen {
				opacity: 0;
				pointer-events: none;
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Loading screen -->
		<div class="loading-screen" id="loading-screen">
			<div class="loading-content">
				<svg class="loading-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M12 2C13.1 2 14 2.9 14 4C14 4.74 13.6 5.39 13 5.73V7C13 8.1 13.9 9 15 9C16.1 9 17 8.1 17 7V6C17 4.9 17.9 4 19 4C20.1 4 21 4.9 21 6V7C21 8.86 20.11 10.5 18.7 11.35C18.89 11.88 19 12.43 19 13C19 15.76 16.76 18 14 18H10C7.24 18 5 15.76 5 13C5 12.43 5.11 11.88 5.3 11.35C3.89 10.5 3 8.86 3 7V6C3 4.9 3.9 4 5 4C6.1 4 7 4.9 7 6V7C7 8.1 7.9 9 9 9C10.1 9 11 8.1 11 7V5.73C10.4 5.39 10 4.74 10 4C10 2.9 10.9 2 12 2Z" fill="#667eea"/>
				</svg>
				<div class="loading-text">Mind Notes</div>
				<div class="loading-subtitle">Preparing your digital mind...</div>
			</div>
		</div>
		
		<!-- Main app container -->
		<div style="display: contents" id="app-container">%sveltekit.body%</div>
		
		<script>
			// Hide loading screen when app is ready
			document.addEventListener('DOMContentLoaded', function() {
				setTimeout(function() {
					document.body.classList.add('app-ready');
					setTimeout(function() {
						const loadingScreen = document.getElementById('loading-screen');
						if (loadingScreen) {
							loadingScreen.remove();
						}
					}, 300);
				}, 500);
			});
			
			// Service Worker registration for PWA features
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', function() {
					navigator.serviceWorker.register('/sw.js')
						.then(function(registration) {
							console.log('ServiceWorker registration successful');
						})
						.catch(function(err) {
							console.log('ServiceWorker registration failed');
						});
				});
			}
			
			// Prevent common XSS attacks
			document.addEventListener('DOMContentLoaded', function() {
				// Disable eval
				window.eval = function() {
					throw new Error('eval() is disabled for security reasons');
				};
				
				// Prevent inline script execution
				const observer = new MutationObserver(function(mutations) {
					mutations.forEach(function(mutation) {
						mutation.addedNodes.forEach(function(node) {
							if (node.nodeType === 1 && node.tagName === 'SCRIPT' && !node.src) {
								node.remove();
								console.warn('Inline script blocked for security');
							}
						});
					});
				});
				
				observer.observe(document.body, {
					childList: true,
					subtree: true
				});
			});
		</script>
	</body>
</html>
